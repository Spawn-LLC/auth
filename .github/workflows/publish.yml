name: Publish to npm

# Publishes @spawn-llc/auth to npm when a vX.Y.Z tag is pushed.
# Setup (once): add an NPM_TOKEN secret — an npm Automation token for a member
# of the @spawn-llc org (npmjs.com → Access Tokens → Generate → Automation).
# To release: run `pnpm run release` (or release:minor / release:major). That
# bumps package.json, commits, and pushes the matching tag, which triggers this
# workflow. The published version is taken from the tag. See RELEASING.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # enables npm OIDC "trusted publishing" (tokenless) if configured on npmjs
# Publishing uses NPM_TOKEN (org secret). Alternatively configure a Trusted Publisher on npmjs
# (package/org → Settings → Trusted Publishing → GitHub Actions: Spawn-LLC/auth, publish.yml) and
# no token is needed. Provenance (--provenance) stays OFF (private source repo).

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      # A release must not be able to ship code the tests reject. This package gates every Spawn
      # app's auth; a red suite here is a blocked release, not a warning.
      - name: Test
        run: pnpm run test

      # Pure package.json version write from the tag — no git, no install.
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        run: pnpm run build

      - name: Publish
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
